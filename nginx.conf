# ============================================================
# 慧动手 GestureTrainingSystem — Nginx 部署配置
# 使用前：
#   1. 将 your-domain.com 替换为实际域名或 IP
#   2. 将 /path/to/GestureTrainingSystem 替换为项目实际路径
#   3. SSL 证书配置（生产环境建议启用 HTTPS）
# ============================================================

server {
    listen 80;
    server_name your-domain.com;
    client_max_body_size 50m;

    # 前端静态文件（Vite build 输出）
    root /path/to/GestureTrainingSystem/frontend/dist;
    index index.html;

    # ========== 前端 SPA 路由 ==========
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========== 后端 API 反向代理 ==========
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ========== 静态资源缓存 ==========
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========== 安全头 ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
